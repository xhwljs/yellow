name: videohub
description: "Flutter 视频聚合 APP — UI/UX-Pro-Max 设计系统驱动"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 状态管理 / 路由 / DI
  get: ^4.6.6

  # 网络层
  dio: ^5.4.3+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # HTML 解析（Dart Jsoup 等价物）
  html: ^0.15.4

  # 本地数据库 (Floor = Flutter 适配版 Room)
  floor: ^1.4.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # 视频播放器
  video_player: ^2.8.6
  chewie: ^1.8.1
  wakelock_plus: ^1.2.4
  screen_brightness: ^1.0.1
  volume_controller: ^1.0.4

  # UI / 设计系统
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh_flutter3: ^2.0.2
  easy_refresh: ^3.3.3+1

  # 工具
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Floor codegen
  floor_generator: ^1.4.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
