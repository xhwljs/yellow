name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # ===== 1. 构建 Android APK =====
  #
  # 说明：原 `analyze-and-test` job 已取消。
  # 如需恢复静态检查 / 单元测试 / dart format 自动提交，
  # 重新加回 `analyze-and-test` job 并让 `build-android` `needs` 依赖它即可。
  #
  # 关键设计（强制更新机制）：
  # 仅在 push 到 main 分支时，本 job 内部计算下一个 tag（v{YYYY.MMDD.N}），
  # 并用 sed 把 tag（去掉 v 前缀）注入到 lib/core/constants/app_constants.dart
  # 的 appVersion 字段。这样：
  #   - CI 构建的 APK 内部 AppConstants.appVersion = "2026.0720.0"
  #   - 用户安装此 APK 后，启动时 GitHubReleaseService.checkForUpdate 比较
  #     AppConstants.appVersion 与 latest release.tagName（去掉 v 前缀）
  #   - 相同 → 跳过更新；不同（latest 更大）→ 弹强制更新对话框
  #   - 避免了"已安装最新版本但仍提示有新版本"的问题
  #
  # tag 通过 job outputs 传给下游 auto-release job 创建 GitHub Release。
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    outputs:
      next_tag: ${{ steps.tag.outputs.next_tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout (full history for tag listing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock', 'pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Compute next tag (only on main push)
        #
        # 仅在 push 到 main 时计算 tag，并注入到 AppConstants.appVersion。
        # PR / develop 分支不计算 tag，appVersion 保持原值（用于本地调试）。
        # 格式：v{YYYY.MMDD.N}
        #   - 当天首次构建 → v2026.0720.0
        #   - 当天后续构建 → v2026.0720.1, v2026.0720.2 ...
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tag
        run: |
          DATE=$(date -u +'%Y.%m%d')
          BASE="v${DATE}"
          # 列出当天已有的所有 tag，取最大编号 +1
          EXISTING=$(git tag -l "${BASE}.*" | sort -V | tail -n 1)
          if [ -z "$EXISTING" ]; then
            NEXT="${BASE}.0"
          else
            N=$(echo "$EXISTING" | awk -F. '{print $NF}')
            NEXT="${BASE}.$((N+1))"
          fi
          # version 是去掉 v 前缀的纯数字版本号（用于注入 AppConstants.appVersion）
          VERSION="${NEXT#v}"
          echo "next_tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed next tag: $NEXT (version: $VERSION)"

      - name: Inject appVersion into AppConstants (only on main push)
        #
        # 用 sed 把 lib/core/constants/app_constants.dart 中的
        # `static const String appVersion = '...';` 替换为
        # `static const String appVersion = '2026.0720.0';`
        #
        # 这样 App 启动时比较 AppConstants.appVersion 与 latest release.tagName，
        # 如果相同就跳过更新，避免"已安装最新版本但仍提示有新版本"的问题。
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION=${{ steps.tag.outputs.version }}
          echo "Injecting appVersion = '$VERSION' into lib/core/constants/app_constants.dart"
          sed -i "s|static const String appVersion = '[^']*';|static const String appVersion = '${VERSION}';|" lib/core/constants/app_constants.dart
          echo "--- AppConstants.appVersion after injection ---"
          grep "appVersion" lib/core/constants/app_constants.dart

      - name: Generate native platform scaffolding (android only)
        #
        # 关键：保留 --project-name=videohub 与 --org com.videohub 不变
        # 这样生成的 Android applicationId 仍是 com.videohub.videohub，
        # 老用户可以平滑升级（不变更包名 = 不丢数据）。
        # Dart 包名已改为 yellow_depot（见 pubspec.yaml），与 Android 包名独立。
        #
        # 1. launcher 显示名 sed 改为 "Yellow Depot"
        # 2. 注入 REQUEST_INSTALL_PACKAGES 权限（自动更新功能需要）
        # 3. 注入 FileProvider 用于分享 APK 给系统安装器（open_file 包需要）
        run: |
          flutter create --platforms=android --project-name=videohub --org com.videohub .
          sed -i 's|android:label="videohub"|android:label="Yellow Depot"|' android/app/src/main/AndroidManifest.xml

          # 在 </manifest> 前注入权限
          sed -i 's|</manifest>|    <!-- 自动更新：安装未知来源 APK 权限（Android 8+ 必需） -->\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n</manifest>|' android/app/src/main/AndroidManifest.xml

          grep -E 'android:label=|REQUEST_INSTALL_PACKAGES' android/app/src/main/AndroidManifest.xml

      - name: Bump Kotlin to 1.9.22 for plugin compatibility
        run: |
          sed -i 's/org.jetbrains.kotlin.android" version "1\.[0-9]\+\.[0-9]\+"/org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          grep kotlin android/settings.gradle

      - name: Run Floor codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (arm64-v8a debug only)
        run: flutter build apk --debug --target-platform android-arm64 --split-per-abi

      - name: Verify produced APK
        run: |
          ls -lh build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 14
          if-no-files-found: error

  # ===== 2. Release 构建（手动 push v* tag 时自动发布）=====
  #
  # 此 job 处理手动 push tag（如 git tag v1.2.3 && git push origin v1.2.3）的场景，
  # 与 auto-release job（push 到 main 自动打 tag）互不影响。
  release:
    name: Release (manual tag)
    needs: [build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Display structure
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/android/*.apk
          body: |
            ## Yellow Depot ${{ github.ref_name }}

            ### 📦 Downloads
            - **Android APK**: `app-arm64-v8a-debug.apk`（见下方附件）

            ### ✅ CI 状态
            - Android 构建: ${{ needs.build-android.result }}

            ### 📝 说明
            由 GitHub Actions 自动构建发布。

  # ===== 3. Auto Release（push 到 main 自动打 tag + 发 Release）=====
  #
  # 触发条件：仅 push 到 main 分支时执行。
  # 流程：
  #   1. 等待 build-android 完成（build-android 已计算 tag 并注入到 APK）
  #   2. 使用 build-android 输出的 tag 创建 GitHub Release（含 APK）
  #
  # 关键点：
  #   - tag 计算和版本号注入都在 build-android 中完成（避免重复计算）
  #   - 通过 gh release create 创建的 tag 不会触发 push 事件，避免循环触发
  #   - 每次 git push 到 main 都会强制生成新版本：
  #     * APK 内的 AppConstants.appVersion 已被注入为 tag（去掉 v）
  #     * App 启动时比较 AppConstants.appVersion 与 latest release.tagName
  #     * 不同（latest 更大）→ 弹强制更新对话框（无"稍后"按钮）
  #     * 相同 → 跳过更新（已安装最新版本）
  auto-release:
    name: Auto Tag + Release
    needs: [build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Verify tag from build-android
        env:
          NEXT_TAG: ${{ needs.build-android.outputs.next_tag }}
          VERSION: ${{ needs.build-android.outputs.version }}
        run: |
          echo "Tag from build-android: $NEXT_TAG"
          echo "Version from build-android: $VERSION"
          if [ -z "$NEXT_TAG" ]; then
            echo "ERROR: next_tag is empty, cannot create release"
            exit 1
          fi

      - name: Create tag + GitHub Release (with APK)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ needs.build-android.outputs.next_tag }}
        run: |
          # release body 包含：
          # 1. 本次具体修改内容（让用户知道更新了什么）
          # 2. "[强制更新]" 标记（App 启动时 GitHubReleaseService 解析此标记
          #    设置 forceUpdate=true，UpdateDialog 仅显示"立即更新"按钮）
          # 本次为强制更新（release body 末尾含 [强制更新] 标记），
          # 用户无法选「稍后」跳过，必须更新到最新版本。
          cat > /tmp/release_notes.md <<'NOTES_EOF'
          ## 本次更新内容

          ### 修复
          - **跳转壳 strU URL 拼接提取根本性问题**：
            旧代码用正则 `var strU = "..."` 只能提取字符串字面量部分，
            但实际跳转壳 JS 是字符串拼接形式：
            `var strU="https://hk234.space:8899/?u="+window.location+"&p="+window.location.pathname+window.location.search;`
            字符串字面量只有 `"https://hk234.space:8899/?u="`，导致请求这个
            不完整 URL 拿不到 302 Location，迁移失败。

            修复方案：模拟 JS 字符串拼接，把 window.location / window.location.pathname /
            window.location.search / window.location.href / window.location.origin 等
            JS 表达式替换为实际值（originalBaseUrl / '/' / ''），然后提取所有字符串
            字面量拼接成完整 URL：`https://hk234.space:8899/?u=http://555976.xyz&p=/`，
            请求此 URL 即可拿到 302 Location: http://555980.xyz，自动迁移成功。

          - 镜像列表测试失败时自动通过跳转壳获取最新地址并加入镜像列表：
            打开「API 服务器」卷帘菜单时自动批量测试镜像列表，发现某镜像已是
            跳转壳则自动通过跳转服务解析到最新真实地址（如 555980.xyz）并
            切换 + 加入镜像列表 + 持久化到 SP。镜像列表 chip 旁边显示
            绿色对勾（通过）/红色叉（失败）/小 loading 圈（测试中）状态徽章。

          - 测试连通性是跳转壳则切换镜像列表显示：
            点击「测试连通性」按钮测试当前 baseUrl，如果是跳转壳则自动
            获取最新网址 → switchTo 持久化 + 加入镜像列表 → 镜像列表
            chip 同步显示新地址为已选中状态。

          [强制更新]
          NOTES_EOF
          # 移除 heredoc 导致的每行前导空格（保持 markdown 结构）
          sed -i 's/^          //' /tmp/release_notes.md
          gh release create "$NEXT_TAG" artifacts/*.apk \
            --title "Release $NEXT_TAG" \
            --notes-file /tmp/release_notes.md \
            --latest

      - name: Verify release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ needs.build-android.outputs.next_tag }}
        run: |
          echo "Release $NEXT_TAG:"
          gh release view "$NEXT_TAG" --json url,name,tagName,createdAt -q '.' || true
